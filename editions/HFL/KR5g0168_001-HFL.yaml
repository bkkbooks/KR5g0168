front:
  text: 上清丹景道精隱地八術經卷上承五
  hash: sha256:5f96c723d3c1bb7f0262cd64b937e510e24768cb221ee5b1f017e74510b781f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0168_HFL_001-001a, image: hfl/1039/1039-004.png}
body:
  text: 紫清飛靈八變玉符隱地八化玄眞之術一曰藏影匿形二曰乗虛御空三曰隱輪飛霄四曰出有入無五曰飛靈八方六曰解形遁變七曰廻晨轉玄八曰隱地儛天此乃上清金臺玉室祕房妙術藏之玉笈封以金章侍以玉童衛以玉女各八百人太上玉晨髙聖君受之於九玄七千年乃傳太極眞人東華大神方諸青童扶桑暘谷神王清虛眞人告盟于上清裂金以誓身有其文者則隱淪八方有修其術則乗虚駕景口口而授不得妄傳子不示父臣不奉君唯在金簡書名玉篇輕泄祕文殃及七玄身爲下鬼充塞河源案如神眞祕而奉焉第一藏形匿影之術當以立春之日平旦入室向東北角上坐思紫雲鬱鬱從東北角上艮宫中下覆滿一室晻冥内外良乆化爲九色之獸狀如驎之形在我眼前因叩齒三十六通而微祝曰廻元變影暎暉幽蘭覆我紫牆藏我金城與炁混合莫顯我形畢便九咽止開目雲氣豁除便服飛靈玉符修之一年形常隱空有難之日立於艮宫之上取本命上土撮以自障案如立春之日祝思炁自覆人不見焉陽符隂符飛靈玉符太極眞人所受服之一年與神同軀萬變縱横形藏玉房其有祕諱不得書文立春之日東向服符微呼八景隂名祝曰天藏地隱二氣合偶艮宫玄房可以騰軀名言上清吞咽靈符元使刀兵與我相畢便服符九咽便止第二乗虛御空之術當以春分之日正中入室東向冥目思碧色之雲鬱鬱如飛輪從東方震宫中下覆滿一室内外晻冥良乆青炁化爲蒼龍在我左耳上纏繞我身叩齒三十六通而微祝曰騰玄御輪廻轉八宫坐則同人起則入空覆我碧霄衛我神龍暎顯我形通幽洞冥吞咽九靈永得无窮畢便九咽止開目服符修之二年乗虛駕空有難之日立於震宫上取行年上土撮以自障案如春分之祝思炁自覆人視如炁飛靈玉符服之三年能乗虚駕晨其有祕名不可語人春分之日東向服符微呼八景隂名祝曰神清玄鈕暎流上清太素曜景玉臺檢名乗虛歩空上造華庭雲龍幡旗來奉我形畢便服符又九咽止第三隱淪飛霄之術當以立夏之日正中入室東南向冥目思赤雲如煙之狀從東南巽宫下來覆滿一室内外晻冥良乆赤炁化爲玄兎在胷腹之上因叩齒三十六通而微祝曰玄兎靈飛啓告三晨披除囂翳通我清津景豋雲輿炁降紫煙萬靈稽首皆伏我前畢便開目服符又九咽止修之三年隱淪空霄有難之日立於巽宫左取十四炁咽之撮太歳上土以自障案如立夏之祝思炁自覆則與炁同形飛靈玉符服之三年隱淪玄霄當以立夏之日東南向服符先微呼八景隂名微祝曰靈飛九天紫暎霞霄服咽八炁吐納六翹神眞充内外欲豁消縱形任巳適意皇朝畢便服符又九咽止第四出有入无之術當以夏至之日正中入空南向冥目思赤炁蓊鬱從南方离宫中來覆滿一室内外晻冥良乆赤雲化爲鳯凰在我頭上因叩齒三十六通而微祝曰赤霞暎玄炁液流通九道之變化爲鳯凰授我眞府賜我玉漿出自天門八自离宫招致雲軿駕虛乗光畢便九咽止開目服符修之四年能出入无窮有難之日立於离宫左取九炁撮九月建上土以自障案如夏至之祝思赤炁自覆則身爲火光飛靈玉符服之四年運身玄虛出幽入无當以夏至之日南向服符先微呼八景名諱祝曰八景我方上天之宗御以神虎挾以羽章嘯咤風雲拘制萬靈出幽入虛莫不濟軿便服符九咽止第五飛靈八方之術者以立秋之日晡時入室西南向冥目内思白炁鬱鬱如天之霧從西南上坤宫中來覆滿一室内外暗冥良乆白雲化爲麒麟對在我前因叩齒三十六通而微祝曰仰注玄精吞咽黄華身生飛羽輕舉豋霞遊宴八宫萬萬不殂畢使九咽止開目服符修之五年能昇八方有難之日立於坤門仰咽三十六炁左取今日辰上土以自障案如立秋之祝思白炁自覆則身化爲露霧人不見也飛靈玉符服之五年遊宴八宫出入虛房當以立秋之日西南向服之先微呼八景名諱祝曰飛靈紫清化爲驎軀上躡玄綱乗空駕虛與我七玄同宴遨遊極天而老終地而休自非金簡莫我干求畢服符又九咽止第六解形遁變之術當以秋分之日晡時入室西向冥目内思白雲從西方兊宫來覆滿一室暗冥良乆白雲化爲神虎在我右邊因叩齒三十六通而微祝曰解形遁變追飛躡浮先謁玉皇退之八嵎分身爲萬適意所求俄頃之變八宫巳周畢便九咽止開目服符修之六年形化影變縱横八方任意所之有難之日當立兊宫之中思火氣來燒我身仰咽七氣取丙上土以自障祝如上法則人莫之見飛靈玉符服之六年解形爲萬化身爲千當以秋分之日西向服符先微呼八景名諱微祝曰玄暎九靈眞炁洞微解形散影驂晨駕暉遊盻八宫出入紫微畢便服符又九咽止第七廻晨轉玄之術當以立冬之日子時入室西北向冥目内思黒雲從西北方上乾宫中來覆滿一室晻冥内外良乆黒雲化爲螣虵在我左足下因叩齒三十六通而微祝曰太隂九玄化爲螣蛇廻輪五星運轉七機上宴玄宫八景同輝吞精吐炁永无終哀畢便九咽止開目服符修之七年能廻轉五晨出入無間有難之日當立乾宫之中思黒雲覆我身仰咽二十五炁取天門上土以障其身祝如立冬之文飛靈玉符服之七年則上宴太清廻化五晨驂龍豋虛當以立冬之日西北向服符先微呼八景隂名微祝曰靈符七轉品同金章上廻五星下轉七玄八術變景出入無間掌籙元籍制御酆山畢服符又九咽止第八隱地儛天之術當以冬至之日子時入室北向内思黒雲壘沓相覆從北方坎宫中來下覆滿一室内外暗冥良乆化爲玄龜在我右足下因叩齒三十六通而微祝曰靈符隱方藏地儛天逃巳六隂顯身玉輪驂龍御煙上造帝晨畢便九咽止開目服符修之八年則豋玉清宫有難之日立在坎宫之上思黒雲覆身仰咽二十五炁取地戶上土以自障祝如冬至之文飛靈玉符服之八年則豋玉清任適周旋當以冬至之日北向服符先呼八景隂名微祝曰八術竒方藏身逃形服符咽氣與眞合靈先宴八宫進豋玉清七玄放解還更童嬰畢便服符又九咽止凡修八術之道未至七日齋戒沐浴燒香至日入室先詠消魔以制萬靈案法爲之修八術呼八景眞名及隂諱十六字悉是八宫大王制御眞仙都官知其名則學仙志不亂邪不干騰歩天綱躡五星之精則八景大王監子所爲降子眞景與炁合并第一玄昌第二修靈第三飛玄第四耀光第五魔王第六飛倉第七合萌第八通靈凡十六諱又有隂諱在師口中修之一年可得逃身修之二年可以乗虛修之三年可以隱淪修之四年可以入无修之五年可以豋八方修之六年解形遁變修之七年可以廻五晨修之八年入地上天長爲之者出入帝晨宴駕雲輪遨騰上清髙上所撰紫清妙篇子遇其文金簡書名案如玄科七百年傳傳至八人畢加金簡封之五嶽編于名山其飛靈玉符毎至本命日夜半子時北向醮獻跪祝之故如是靈飛六甲同文其文髙妙其誓尤深案如玄眞白素四十尺紫紋八十尺金鈕八𩀱以代列告之盟授者曰師受者弟子違科負誓七祖風刀之考巳身爲下鬼五苦八難萬劫不原祕而愼之上清丹景道精隱地八術經卷上
