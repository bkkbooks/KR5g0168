front:
  text: 上清丹景道精隱地八術經卷下承六
  hash: sha256:4ea8097e1315ea58d53ff0ab6ed707c595fc46d6cf2da0fbd7817208733113db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0168_HFL_002-001a, image: hfl/1039/1039-026.png}
body:
  text: 入術祕經扄音隱地八術乃紫清帝君遊隱之道玄變之訣舊文乃有八卷變化八方上妙之法藏形隱影之事祕於玄都金臺之内道君傳於金闕帝君使教後學應爲真人者凡有托化去此適彼以厭衆情或觧災度厄出有入無或修行飛仙上昇九玄皆當審知隱諱服御靈符脩念八年則能坐在立亡隱影逃形乘雲控龍白日昇晨唯在寳祕勿妄輕傳欲隱离上之災當逃身坎宮之下書离上之符於額書坎上符於左足蹠正立北向思已身化成黑龍雲氣鬱冥以冠身形閉氣十二息叩齒十二通三呼紫清帝君我身者災厄在离宮當令變化易體改容隱入北極炁同神龍左取十二炁咽之北入坎宮之下則形化體隱人不見焉此上道妙法祕而奉行口口相傳於文欲隱坤上之災當逃身震宮之下書坤上符於頸書震上符於左脅正立東向思已身化爲青龍雲炁鬱冥化身閉炁三十六息叩齒九通三呼紫清帝君願爲我隱形於震宮斷災於西南上化巳爲青龍昇飛於東方畢左取三十六炁咽之東之太山之阿形化身隱傍視如无此大道妙法受師口言欲隱兌上之災當逃身离宮之下書兌上符於口上書离上符於心上正立南向思巳身化爲鳳凰雲炁鬱冥以冠身形閉炁八息叩齒七通三呼紫清帝君願爲我藏形於离宮禳災於西方上餐玄元之炁化體爲鳳凰逃身變形出有入無人无覩見與炁混同畢右取八炁咽之南出衡山之下則舉形變化人无見者其道祕妙不妄傳於人欲隱乾上之災當逃身巽宮之下書乾上符於頭書巽上符於腹正立向東南上思巳身化爲螣蛇雲炁鬱冥冠身閉炁二十四息叩齒十六通三呼紫清帝君願爲我逃身於巽宮絕災於西南化形爲螣蛇伏炁於九陰畢右取四炁咽之往東南之巽宮則形隱身存藏入於林草之中人莫見其形其道玄祕受師口言欲隱坎上之災當逃身坤宮之下書坎上符於右足書坤上符於頭正立西南上思巳身化爲麒麟雲炁鬱冥以冠身形閉炁七息叩齒十二通三呼紫清帝君願爲我隱形於西南絕災於北玄上引太陰炁化身爲麒麟隱形於雲霧无使見我身畢右取十六炁咽之逕之西南坤地形化體隱與獸同羣此上道妙法受師口言欲隱艮上之災當逃身於乾宮之下書艮上符於兩手書乾上符於頭上正立西北向思巳身化爲土山雲炁帀冠山上閉炁三十息叩齒二十四通三呼紫清帝君願爲我藏身於西北絕災於艮宮化身爲土山變服爲草林畢左取三十炁咽之逕之常山之顛人見如山其法甚妙祕在師門欲隱震宮之灾當逃身兌宮之中書震上符於左脅書兌上符於口上正立向西方思巳身化爲白虎雲氣冠覆巳身閉炁十二息叩齒八通三呼紫清帝君願爲我隱身於華陰絕灾於震宮變形爲白虎毛爪爲衣裳得遠九灾之下昇入神金之鄉畢右取十二炁咽之逕詣華陰山形爲白虎人莫能干道之上術師口祕言欲隱巽上之灾當逃身艮宮之下書巽上符於腹書艮上符於兩手正立向東北思巳身化爲青牛雲氣覆形閉炁二十四息叩齒九通三呼紫清帝君願爲我逃形變體化爲青牛雲氣鬱鬱以冠我軀昇入九玄與炁同浮畢左取二十四炁咽之逕之艮宮之中則形化影變昇入太无中其法祕妙受師口言夫隱地八術之法皆先服紫清玉符存思隱諱然後而去則天炁覆身於上地炁載形於下雲霧冠帀於四域千變萬化隨意所適災无不消厄無不脫黃上先生受之於北谷以避禪國之敵黃帝受之於甯生以隱於遊學東海小童受之於九真以陰化於北泉子州受之於太極習隱變而長存彭祖受之於王君修改易而延年八公受之於靈希以化一爲八身黑子受之於鬼谷以隱淪於无間如此之妙化有億千凡修學之士故在人間而不知隱化有厄莫全若有宿命骨體應仙當詣經師請受祕言宣告非人用則不行罪延七祖禍滅於身受者宜慎慎勿示人八學隱諱九天之隱音化爲十六字又外名顯於世至士學者當知隱諱以昇元服符以化身能隱能化身入太清凡修八術之道每至八節之日入室清齋服飛靈玉符存八宮玉皇正諱服八宮玉音十六字隨扄次而修之八年八景真形見也通靈達微遊宴八宮上登玉晨學仙之夫宜按三五混合之要修行之法當先從艮宮左廻周帀於坎宮不必至一節一服可通書八音以次頓服但按別訣祝說適意所求爾服木宮玉皇正諱當向艮宮三呼大願得藏形匿形身登木宮次服少陽宮玉皇正諱當向震宮三呼幽宨願得乘虛御空身騰少陽宮次服玄宮玉皇正諱當向巽宮三呼无英願得隱淪飛霄出入玄宮次服生宮玉皇正諱當向离宮三呼伯使願得出有入無逍遙生宮次服陽宮玉皇正諱當向坤宮三呼運珠願得飛靈八方化身陽宮次服少陰宮玉皇正諱當向兌宮三呼二儀願得解形遁變流染金宮次服開宮玉皇正諱當向乾宮三呼元輔願得廻晨轉玄適意開宮次服陰宮玉皇正諱當向坎宮三呼陰精願得隱地儛天變景陰宮八宮都畢平坐東向咽二十四炁而微祝曰高上有命百神敬從八宮玉皇道之祖宗有知我諱真靈交通得服玉音坐在立亡八年周匝神駕來迎上造紫庭位准仙卿畢常能修之如此至道畢矣妙術極矣外有八諱一十六字兼而修之益佳但求仙修内炁解罹難亦呼外是故兩存爾八宮真皇道君玉諱藏之玉清瓊房金蘭紫房之内九玄真仙命北牖入室弟子撰出素章以付玉晨高聖君七年傳授當仙之骨有宿挺金闕玉名之人依四極明科𧵥而傳之盟用紫金八兩丹紋八十尺跪受訣言真諱隱術非浮學之夫所可叅聞妄傳至音付非其人七祖父母摙蒙山之石填積夜之河身被風刀八難之考明慎之哉明慎之哉太極真人昔受八術玉音修行法度亦與詠三十九章音同萬遍乃佳詠此音亦響徹玉清萬神莫不來朝八年便得遊行玉清宮也上清丹景道精隱地八術經卷下
